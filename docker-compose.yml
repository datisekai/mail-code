services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:3007:3001"
    env_file: .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3005:3000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      - backend
